# Syncs finished match results every 5 minutes by hitting the Vercel serverless function.
#
# Required secret: APP_URL
#   Set this in your GitHub repo under Settings > Secrets and variables > Actions.
#   Value should be the full base URL of your Vercel deployment, e.g.:
#     https://your-app.vercel.app
#   (no trailing slash)

name: Sync Match Results

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-results endpoint
        run: |
          curl -sf "${{ secrets.APP_URL }}/api/sync-results" -o /dev/null -w "HTTP %{http_code}" \
            && echo " — Sync succeeded" \
            || echo "Sync failed (non-critical)"
